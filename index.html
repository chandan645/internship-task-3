<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 3 - Advanced Styling & JavaScript</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Advanced Styling & JavaScript Project</h1>
</header>

<main class="container">

    <!-- ✅ QUIZ SECTION -->
    <section class="card">
        <h2>Interactive Quiz</h2>

        <div id="quiz">
            <h3 id="question"></h3>
            <div id="answers"></div>
            <button id="nextBtn">Next</button>
            <p id="score"></p>
        </div>
    </section>

    <!-- ✅ API SECTION -->
    <section class="card">
        <h2>Random Joke (API Fetch)</h2>
        <p id="joke">Click the button to load a joke.</p>
        <button id="getJoke">Get Joke</button>
    </section>

</main>

<footer>
    <p>Internship Task 3 | Responsive + Quiz + API</p>
</footer>

<script src="script.js"></script>
</body>
</html>
